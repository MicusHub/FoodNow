name: Selenium Tests

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: 'adopt'
          java-version: 11
      - name: Set JAVA_HOME for Java 11
        run: echo "JAVA_HOME=$(find /usr/lib/jvm -name 'adoptopenjdk-11-*')" >> $GITHUB_ENV
      - name: Install Chrome #  Попробуй найти Chrome 114.* для Ubuntu
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: '114.0.5735.198' # Пример. Проверь доступность этой версии
      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: build
      - name: Run tests with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: test