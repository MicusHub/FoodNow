name: Selenium Tests

on:
  push:
    branches:
      - main  # Ветка, на которой выполняется workflow

jobs:
  build:
    runs-on: ubuntu-22.04  # Явно указана версия Ubuntu

    steps:
      # Checkout репозитория
      - name: Checkout repository
        uses: actions/checkout@v2

      # Установка JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          distribution: 'temurin'  # Обновлено на поддерживаемый дистрибутив
          java-version: '17'

      # Установка и настройка WebDriver
      - name: Set up WebDriver
        run: |
          wget -q https://chromedriver.storage.googleapis.com/114.0.5735.90/chromedriver_linux64.zip
          unzip chromedriver_linux64.zip
          sudo mv chromedriver /usr/local/bin/

      # Установка зависимостей с помощью Gradle
      - name: Set up Gradle
        uses: gradle/wrapper-validation-action@v1

      - name: Build with Gradle
        run: ./gradlew build

      # Запуск тестов
      - name: Run tests
        run: ./gradlew test
        id: test

      # Уведомление о результатах в Slack
      - name: Send Slack notification
        if: always()  # Отправить уведомление независимо от того, прошли ли тесты
        uses: slackapi/slack-github-action@v1.22.0
        with:
          payload: |
            {
              "text": "GitHub Actions: Selenium Tests completed.\n*Result*: ${{ job.status }}\nView details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "channel": "#your-slack-channel"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
